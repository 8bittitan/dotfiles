"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 1000

# Prompt
format = """
$directory\
$git_branch\
$git_status\
$line_break\
$character"""

right_format = """$all"""

# Themes
palette = "nightfox"

[palettes.nightfox]
black = "#393b44"
blue = "#719cd6"
cyan = "#63cdcf"
green = "#81b29a"
purple = "#9d79d6"
red = "#c94f6d"
white = "#dfdfe0"
yellow = "#dbc074"
bright_black = "#575860"
bright_blue = "#86abdc"
bright_cyan = "#7ad5d6"
bright_green = "#8ebaa4"
bright_purple = "#baa1e2"
bright_red = "#d16983"
bright_white = "#e4e4e5"
bright_yellow = "#e0c989"

[directory]
style = "cyan"
format = "[$path]($style)"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

[git_branch]
symbol = "´Éÿ"
format = "[ $symbol $branch ]($style)"
style = "bright_purple"

[git_status]
format = "[($all_status$ahead_behind )]($style)"
style = "bright_purple"

